<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>J.A.R.V.I.S. — Command Center</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="_ds_bundle.js"></script>
<style>
  html, body { height: 100%; margin: 0; background: var(--jv-void, #030810); }
  #root { position: fixed; inset: 0; }
  .placeholder { display: grid; place-items: center; height: 60vh; color: var(--jv-text-muted); font: var(--fw-medium) 14px var(--font-body); gap: 10px; text-align: center; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(41,211,245,0.18); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="screens/AppShell.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/CommandCenter.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/AICore.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/Agents.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/TasksKanban.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/Calendar.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/Memory.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/Conversations.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/KnowledgeBase.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/ToolsSkills.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/Workflows.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/SystemMonitor.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/AboutModal.jsx" data-presets="react"></script>
<script type="text/babel" src="screens/tweaks-panel.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
  const TWEAK_DEFAULTS = {
    accent: "cyan",
    viz: "radial",
    bars: 96,
    transcript: true,
  };
  const ACCENTS = {
    cyan:    { c400: "#29d3f5", c300: "#4fdcff", c100: "#a5ecff", glow: "rgba(41,211,245,0.55)" },
    emerald: { c400: "#34d399", c300: "#6ee7b7", c100: "#bbf7e0", glow: "rgba(52,211,153,0.55)" },
    violet:  { c400: "#a78bfa", c300: "#c4b5fd", c100: "#ddd6fe", glow: "rgba(167,139,250,0.55)" },
    amber:   { c400: "#fbbf24", c300: "#fcd34d", c100: "#fde68a", glow: "rgba(251,191,36,0.55)" },
  };
  const HEX2KEY = { "#29d3f5": "cyan", "#34d399": "emerald", "#a78bfa": "violet", "#fbbf24": "amber" };

  const VIEWS = {
    command: "CommandCenter", aicore: "AICore", agents: "Agents", tasks: "TasksKanban",
    calendar: "Calendar", memory: "Memory", conversations: "Conversations",
    knowledge: "KnowledgeBase", tools: "ToolsSkills", workflows: "Workflows", monitor: "SystemMonitor",
  };

  function App() {
    const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
    const [view, setView] = React.useState("command");
    const [about, setAbout] = React.useState(false);
    const acc = ACCENTS[t.accent] || ACCENTS.cyan;

    React.useEffect(() => {
      const r = document.documentElement.style;
      r.setProperty("--jv-cyan-400", acc.c400);
      r.setProperty("--jv-cyan-300", acc.c300);
      r.setProperty("--jv-cyan-100", acc.c100);
      r.setProperty("--jv-glow-cyan", acc.glow);
    }, [t.accent]);

    const tweaks = { viz: t.viz, bars: t.bars, showTranscript: t.transcript, accentColor: acc.c400 };

    let body;
    if (view === "command") {
      body = <window.CommandCenter tweaks={tweaks} />;
    } else {
      const Comp = window[VIEWS[view]];
      body = Comp ? <Comp /> : (
        <div className="placeholder">This surface isn't part of the kit yet.</div>
      );
    }

    const { TweaksPanel, TweakSection, TweakRadio, TweakSlider, TweakToggle, TweakColor, AboutModal } = window;
    return (
      <React.Fragment>
        <window.AppShell active={view} onNav={setView} onAbout={() => setAbout(true)} showDock={view !== "command"}>
          {body}
        </window.AppShell>
        {about && <AboutModal onClose={() => setAbout(false)} />}
        {TweaksPanel && (
          <TweaksPanel title="Tweaks">
            <TweakSection label="Voice core" />
            <TweakRadio label="Visualizer" value={t.viz} options={["radial", "pulse", "linear"]} onChange={(v) => setTweak("viz", v)} />
            <TweakSlider label="Waveform bars" value={t.bars} min={24} max={96} step={4} onChange={(v) => setTweak("bars", v)} />
            <TweakToggle label="Show transcript" value={t.transcript} onChange={(v) => setTweak("transcript", v)} />
            <TweakSection label="Theme" />
            <TweakColor label="Accent" value={acc.c400} options={["#29d3f5", "#34d399", "#a78bfa", "#fbbf24"]} onChange={(hex) => setTweak("accent", HEX2KEY[hex] || "cyan")} />
          </TweaksPanel>
        )}
      </React.Fragment>
    );
  }

  function mount() {
    const needed = ["AppShell", "CommandCenter", "AICore", "Agents", "TasksKanban", "Calendar", "Memory", "Conversations", "KnowledgeBase", "ToolsSkills", "Workflows", "SystemMonitor", "AboutModal", "useTweaks"];
    if (needed.some((k) => !window[k])) return setTimeout(mount, 40);
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  }
  mount();
</script>
</body>
</html>
