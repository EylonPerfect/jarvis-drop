# Nginx: serve the SPA and proxy /api to the BFF (SSE-safe: no buffering).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API + streaming (Server-Sent Events for chat).
  location /api/ {
    # Resolve the BFF via Docker's embedded DNS at request time (not at boot),
    # using a variable so nginx starts even if the BFF isn't up yet and survives
    # BFF restarts — otherwise nginx exits with "host not found in upstream" and
    # the whole web container crash-loops (which makes Traefik 404 the site).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $bff_upstream http://bff:8787;
    proxy_pass $bff_upstream;
    proxy_http_version 1.1;
    # If BFF_API_KEY is set, inject it here so the browser never holds the key.
    # (Templatize this value at deploy time, e.g. via envsubst.)
    # proxy_set_header X-API-Key "your-bff-api-key";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # Critical for SSE / token streaming: disable buffering and allow long-lived responses.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
