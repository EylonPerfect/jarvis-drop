<svg width="680" height="360" viewBox="0 0 680 360" role="img" xmlns="http://www.w3.org/2000/svg">
<title>After Human logo</title>
<desc>A human silhouette dissolving into an ordered grid of squares in cyan, with the wordmark AFTER HUMAN beneath it.</desc>
<style>
.mk{fill:#0F1720}
.ac{fill:#38C6F4}
.wd{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:500;letter-spacing:14px;font-size:34px;fill:#0F1720}
.wd2{font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-weight:400;letter-spacing:14px;font-size:34px;fill:#7C93A8}
.tag{font-family:'IBM Plex Mono','SF Mono',monospace;font-size:12px;letter-spacing:3px;fill:#7C93A8}
@media (prefers-color-scheme: dark){
.mk{fill:#E8F2FA}
.ac{fill:#5FD4FF}
.wd{fill:#E8F2FA}
}
</style>

<g transform="translate(216,44)">
