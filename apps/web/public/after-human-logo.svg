<rect class="ac" x="52" y="78" width="18" height="18" rx="2"/>
<rect class="ac" x="0" y="104" width="18" height="18" rx="2"/>
<rect class="ac" x="26" y="104" width="18" height="18" rx="2"/>
<rect class="ac" x="52" y="104" width="18" height="18" rx="2"/>
