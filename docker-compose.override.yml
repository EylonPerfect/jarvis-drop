services:
  bff:
    networks: [default, hermes]
    environment:
      HERMES_DASH_USER: ${HERMES_DASH_USER:-}
      HERMES_DASH_PASS: ${HERMES_DASH_PASS:-}
  web:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=jarvis-new_default"
      - "traefik.http.routers.jarvis.rule=Host(`jarvis.srv1797540.hstgr.cloud`)"
      - "traefik.http.routers.jarvis.entrypoints=websecure"
      - "traefik.http.routers.jarvis.tls.certresolver=letsencrypt"
      - "traefik.http.services.jarvis.loadbalancer.server.port=80"
networks:
  hermes:
    external: true
    name: hermes-agent-d28a_default
