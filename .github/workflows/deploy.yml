name: Deploy to VPS

# Deploys the stack to the Hostinger VPS over SSH. Gated on repo secrets:
#   VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PATH  (path to the checked-out repo on the VPS)
# Trigger manually, or on push to main once secrets are configured.
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip automatically until the VPS_HOST secret is set.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            ./scripts/deploy.sh
