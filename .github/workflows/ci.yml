name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck (shared, bff, web)
        run: npm run typecheck
      - name: Build (shared + web bundle)
        run: |
          npm run build --workspace=@jarvis/shared
          npm run build --workspace=@jarvis/web

  db-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: jarvis
          POSTGRES_DB: jarvis
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U jarvis"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgres://jarvis:jarvis@127.0.0.1:5432/jarvis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Migrate + seed against Postgres
        run: |
          npm run db:migrate
          npm run db:seed
